<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1410">
<title>Mundial 2026 · Predicciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1410;
    --surface:#131f18;
    --surface-2:#1b2c22;
    --line:#24372c;
    --text:#f2f4ef;
    --muted:#8fa396;
    --gold:#e3b23c;
    --pitch:#3c7a45;
    --steel:#5b8aa6;
    --red:#c1432e;
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:'Inter',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:contain;
  }
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;}
  img{max-width:100%;display:block;}
  .hidden{display:none !important;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(14px + var(--safe-top)) 18px 10px;
  }
  .brand{font-family:'Anton',sans-serif;letter-spacing:0.5px;font-size:20px;display:flex;align-items:baseline;gap:6px;}
  .brand-year{color:var(--gold);}
  .icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);}
  .icon-btn:active{background:var(--surface-2);}
  .daynav{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 14px;gap:8px;}
  .nav-arrow{width:34px;height:34px;border-radius:10px;background:var(--surface);font-size:18px;color:var(--muted);}
  .nav-arrow:disabled{opacity:0.3;}
  .day-label{flex:1;text-align:center;font-weight:600;font-size:14px;text-transform:capitalize;}
  .match-list{flex:1;padding:0 14px 30px;display:flex;flex-direction:column;gap:10px;}
  .empty-state{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5;}
  .match-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:10px;
  }
  .match-card:active{background:var(--surface-2);}
  .mc-team{flex:1;display:flex;align-items:center;gap:8px;min-width:0;}
  .mc-team.right{flex-direction:row-reverse;text-align:right;}
  .mc-flag{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--surface-2);flex-shrink:0;}
  .mc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mc-center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px;}
  .mc-score{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px;}
  .mc-time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .mc-status{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.3px;}
  .status-ns{background:rgba(143,163,150,.15);color:var(--muted);}
  .status-live{background:rgba(193,67,46,.18);color:#e07a64;}
  .status-ft{background:rgba(60,122,69,.18);color:#7fbf85;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:50;}
  .sheet{
    background:var(--bg);width:100%;max-height:92vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:18px 18px calc(24px + var(--safe-bottom));
    position:relative;animation:slideup .22s ease-out;
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .close-btn{position:absolute;top:14px;right:14px;}
  .muted-text{color:var(--muted);font-size:13px;line-height:1.5;}
  .detail-header{padding-top:6px;margin-bottom:18px;}
  .detail-round{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
  .detail-venue{font-size:12px;color:var(--muted);margin-top:2px;}
  .detail-teams{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0 6px;}
  .dt-team{flex:1;text-align:center;}
  .dt-flag{width:46px;height:46px;border-radius:50%;object-fit:cover;margin:0 auto 6px;background:var(--surface);}
  .dt-name{font-size:13px;font-weight:700;}
  .dt-vs{font-size:11px;color:var(--muted);font-weight:600;}
  .detail-kickoff{text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;}
  .scoreboard{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;text-align:center;margin-bottom:14px;
  }
  .sb-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .sb-score{font-family:'Anton',sans-serif;font-size:48px;color:var(--gold);letter-spacing:4px;line-height:1;}
  .sb-actual{font-size:13px;color:var(--pitch);font-weight:700;margin-top:8px;}
  .probbar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:10px 0 8px;}
  .probbar div:nth-child(1){background:var(--gold);}
  .probbar div:nth-child(2){background:var(--muted);}
  .probbar div:nth-child(3){background:var(--steel);}
  .problabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
  .problabels b{color:var(--text);font-size:12px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .stat-card .value{font-family:'Anton',sans-serif;font-size:22px;margin-top:4px;}
  .stat-card .note{font-size:10px;color:var(--muted);margin-top:3px;}
  .section-title{font-size:13px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
  .section-title .gold{color:var(--gold);}
  .form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .form-row .team{font-size:12px;font-weight:600;flex:1;}
  .form-dots{display:flex;gap:4px;}
  .dot{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#0b1410;}
  .dot.w{background:var(--pitch);color:#eafaec;}
  .dot.d{background:var(--muted);color:#0b1410;}
  .dot.l{background:var(--red);color:#fcebe7;}
  .player-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .player-row:last-child{border-bottom:none;}
  .player-dot{width:28px;height:28px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold);flex-shrink:0;}
  .player-info{flex:1;min-width:0;}
  .player-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-team{font-size:11px;color:var(--muted);}
  .player-stat{font-size:12px;font-weight:700;color:var(--gold);text-align:right;white-space:nowrap;}
  .skeleton{display:flex;flex-direction:column;gap:10px;padding:30px 0;align-items:center;color:var(--muted);font-size:13px;}
  .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--gold);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-banner{background:rgba(193,67,46,.15);color:#e07a64;border:1px solid rgba(193,67,46,.3);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;margin:10px 0;}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;padding:18px 20px 6px;line-height:1.5;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">MUNDIAL <span class="brand-year">2026</span></div>
    <button id="refreshBtn" class="icon-btn" aria-label="Actualizar">↻</button>
  </header>
  <nav class="daynav">
    <button id="prevDay" class="nav-arrow">‹</button>
    <div id="dayLabel" class="day-label">—</div>
    <button id="nextDay" class="nav-arrow">›</button>
  </nav>
  <main id="matchList" class="match-list"></main>
  <p class="disclaimer">Predicciones generadas con un modelo estadístico propio a partir de los datos reales del torneo. Son estimaciones, no garantías.</p>
  <div id="detailOverlay" class="overlay hidden">
    <div class="sheet">
      <button class="icon-btn close-btn" data-close="detail" aria-label="Cerrar">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';

const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=300';
const TOURNAMENT_START = '2026-06-11';
const TOURNAMENT_END = '2026-07-19';

const state = { matches: [], selectedDate: null };

function cacheGet(key){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
function cacheSet(key, obj){
  try{ localStorage.setItem(key, JSON.stringify(obj)); }catch(e){}
}

function normalize(json){
  const events = json.events || [];
  return events.map(ev=>{
    const comp = ev.competitions && ev.competitions[0];
    if(!comp) return null;
    const home = comp.competitors.find(c=>c.homeAway==='home');
    const away = comp.competitors.find(c=>c.homeAway==='away');
    if(!home || !away) return null;
    const mapTeam = c => ({
      id: c.team.id,
      name: c.team.displayName,
      logo: c.team.logo,
      score: c.score!=null ? Number(c.score) : null,
      winner: !!c.winner,
      form: c.form || '',
      stats: (c.statistics||[]).reduce((acc,s)=>{ acc[s.name]=parseFloat(s.displayValue); return acc; },{})
    });
    return {
      id: ev.id,
      kickoff: new Date(ev.date),
      statusState: comp.status.type.state,
      statusDetail: comp.status.type.shortDetail,
      venue: comp.venue ? comp.venue.fullName : '',
      city: comp.venue && comp.venue.address ? comp.venue.address.city : '',
      groupNote: comp.altGameNote || '',
      home: mapTeam(home),
      away: mapTeam(away),
      details: comp.details || []
    };
  }).filter(Boolean);
}

async function loadMatches(force){
  const cached = cacheGet('wc26:matches');
  if(!force && cached && (Date.now()-cached.ts) < 5*60*1000){
    state.matches = cached.data;
    return;
  }
  const res = await fetch(ESPN_URL);
  if(!res.ok) throw new Error('HTTP_'+res.status);
  const json = await res.json();
  state.matches = normalize(json);
  cacheSet('wc26:matches', { ts: Date.now(), data: state.matches });
}

function localDateKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function fmtDayLabel(dateKey){
  const d = new Date(dateKey+'T12:00:00');
  const todayKey = localDateKey(new Date());
  const opts = {weekday:'short', day:'numeric', month:'short'};
  let label = d.toLocaleDateString('es-ES', opts).replace('.','');
  if(dateKey===todayKey) label = 'Hoy · ' + d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  return label;
}
function fmtTime(d){ return d.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}); }

function translateRound(note){
  if(!note) return '';
  const map = [
    [/Group ([A-L])/i, m=>'Fase de grupos · Grupo '+m[1]],
    [/Round of 32/i, ()=>'Dieciseisavos de final'],
    [/Round of 16/i, ()=>'Octavos de final'],
    [/Quarterfinal/i, ()=>'Cuartos de final'],
    [/Semifinal/i, ()=>'Semifinal'],
    [/3rd Place/i, ()=>'Tercer puesto'],
    [/Final/i, ()=>'Final'],
  ];
  for(const [re,fn] of map){ const m = note.match(re); if(m) return fn(m); }
  return note.replace('FIFA World Cup, ','');
}

function statusInfo(m){
  if(m.statusState==='in') return {cls:'status-live', label:'En vivo'};
  if(m.statusState==='post') return {cls:'status-ft', label:'Finalizado'};
  return {cls:'status-ns', label:'Por jugar'};
}

const elList = document.getElementById('matchList');
const elDayLabel = document.getElementById('dayLabel');

function matchesForDate(dateKey){
  return state.matches.filter(m=> localDateKey(m.kickoff)===dateKey)
    .sort((a,b)=> a.kickoff - b.kickoff);
}

function renderDay(){
  elDayLabel.textContent = fmtDayLabel(state.selectedDate);
  const list = matchesForDate(state.selectedDate);
  document.getElementById('prevDay').disabled = state.selectedDate <= TOURNAMENT_START;
  document.getElementById('nextDay').disabled = state.selectedDate >= TOURNAMENT_END;
  if(!list.length){
    elList.innerHTML = '<div class="empty-state">No hay partidos este día.<br>Usá las flechas para moverte por el calendario.</div>';
    return;
  }
  elList.innerHTML = list.map(m=>{
    const st = statusInfo(m);
    const played = m.statusState!=='pre';
    const scoreTxt = played ? `${m.home.score ?? '-'} : ${m.away.score ?? '-'}` : 'vs';
    return `
      <div class="match-card" data-id="${m.id}">
        <div class="mc-team">
          <img class="mc-flag" src="${m.home.logo}" alt="" onerror="this.style.visibility='hidden'">
          <span class="mc-name">${m.home.name}</span>
        </div>
        <div class="mc-center">
          <span class="mc-score">${scoreTxt}</span>
          <span class="mc-time">${fmtTime(m.kickoff)}</span>
          <span class="mc-status ${st.cls}">${st.label}</span>
        </div>
        <div class="mc-team right">
          <img class="mc-flag" src="${m.away.logo}" alt="" onerror="this.style.visibility='hidden'">
          <span class="mc-name">${m.away.name}</span>
        </div>
      </div>`;
  }).join('');
}

function shiftDay(delta){
  const d = new Date(state.selectedDate+'T12:00:00');
  d.setDate(d.getDate()+delta);
  const key = localDateKey(d);
  if(key < TOURNAMENT_START || key > TOURNAMENT_END) return;
  state.selectedDate = key;
  renderDay();
}

function teamMatches(teamId){
  return state.matches.filter(m=> m.home.id===teamId || m.away.id===teamId)
    .sort((a,b)=> a.kickoff - b.kickoff);
}
function teamSide(m, teamId){ return m.home.id===teamId ? m.home : m.away; }
function oppSide(m, teamId){ return m.home.id===teamId ? m.away : m.home; }

function teamAverages(teamId){
  const played = teamMatches(teamId).filter(m=> m.statusState==='post');
  if(!played.length) return { gf:1.2, ga:1.2, corners:5, count:0 };
  let gf=0, ga=0, corners=0, cCount=0;
  played.forEach(m=>{
    const me = teamSide(m, teamId), opp = oppSide(m, teamId);
    gf += me.score||0; ga += opp.score||0;
    if(me.stats && me.stats.wonCorners!=null){ corners += me.stats.wonCorners; cCount++; }
  });
  return {
    gf: gf/played.length,
    ga: ga/played.length,
    corners: cCount ? corners/cCount : 5,
    count: played.length
  };
}

function teamCardsPerGame(teamId){
  const played = teamMatches(teamId).filter(m=> m.statusState==='post');
  if(!played.length) return 1.8;
  let cards=0;
  played.forEach(m=>{
    m.details.forEach(d=>{
      if((d.yellowCard||d.redCard) && d.team && d.team.id===teamId) cards++;
    });
  });
  return cards/played.length;
}

function teamTopScorers(teamId){
  const played = teamMatches(teamId).filter(m=> m.statusState==='post');
  const tally = {};
  played.forEach(m=>{
    m.details.forEach(d=>{
      if(d.scoringPlay && !d.ownGoal && d.team && d.team.id===teamId && d.athletesInvolved && d.athletesInvolved[0]){
        const name = d.athletesInvolved[0].displayName;
        tally[name] = (tally[name]||0)+1;
      }
    });
  });
  return Object.entries(tally).sort((a,b)=> b[1]-a[1]).slice(0,5);
}

function factorial(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function poissonPMF(lambda,k){ return Math.exp(-lambda)*Math.pow(lambda,k)/factorial(k); }
function buildMatrix(eh,ea,maxG){
  const m=[];
  for(let h=0;h<=maxG;h++){ const row=[]; for(let a=0;a<=maxG;a++) row.push(poissonPMF(eh,h)*poissonPMF(ea,a)); m.push(row); }
  return m;
}
function summarize(matrix){
  let pH=0,pD=0,pA=0,best={h:0,a:0,p:-1};
  for(let h=0;h<matrix.length;h++) for(let a=0;a<matrix[h].length;a++){
    const p=matrix[h][a];
    if(h>a) pH+=p; else if(h===a) pD+=p; else pA+=p;
    if(p>best.p) best={h,a,p};
  }
  return {pH,pD,pA,best};
}

function computePrediction(homeId, awayId){
  const A = teamAverages(homeId), B = teamAverages(awayId);
  let expHome = (A.gf + B.ga)/2;
  let expAway = (B.gf + A.ga)/2;
  expHome = Math.min(Math.max(expHome,0.3),3.6);
  expAway = Math.min(Math.max(expAway,0.3),3.6);
  const matrix = buildMatrix(expHome, expAway, 6);
  const {pH,pD,pA,best} = summarize(matrix);
  let probHome = Math.round(pH*100), probAway = Math.round(pA*100);
  let probDraw = 100-probHome-probAway; if(probDraw<0) probDraw=0;
  const cardsEstimate = Math.round((teamCardsPerGame(homeId)+teamCardsPerGame(awayId))*10)/10;
  const cornersEstimate = Math.round((A.corners+B.corners)*10)/10;
  return {
    expHome: Math.round(expHome*10)/10, expAway: Math.round(expAway*10)/10,
    predHome: best.h, predAway: best.a,
    probHome, probDraw, probAway, cardsEstimate, cornersEstimate
  };
}

function formDots(formStr){
  if(!formStr) return '<span class="muted-text">Sin datos recientes</span>';
  return '<div class="form-dots">' + formStr.split('').slice(-5).map(ch=>{
    let cls='d', letter='E';
    if(ch==='W'){cls='w';letter='G';} else if(ch==='L'){cls='l';letter='P';}
    return `<span class="dot ${cls}">${letter}</span>`;
  }).join('') + '</div>';
}

const detailOverlay = document.getElementById('detailOverlay');
const detailContent = document.getElementById('detailContent');

function openMatchDetail(id){
  const m = state.matches.find(x=> x.id===id);
  if(!m) return;
  detailOverlay.classList.remove('hidden');
  const pred = computePrediction(m.home.id, m.away.id);
  const finished = m.statusState==='post';
  const actualScore = finished ? `<div class="sb-actual">Resultado real: ${m.home.score} : ${m.away.score}</div>` : '';

  const scoreboard = `
    <div class="scoreboard">
      <div class="sb-label">Predicción del modelo</div>
      <div class="sb-score">${pred.predHome} : ${pred.predAway}</div>
      <div class="probbar">
        <div style="width:${pred.probHome}%"></div>
        <div style="width:${pred.probDraw}%"></div>
        <div style="width:${pred.probAway}%"></div>
      </div>
      <div class="problabels">
        <span>${m.home.name} <b>${pred.probHome}%</b></span>
        <span>Empate <b>${pred.probDraw}%</b></span>
        <span>${m.away.name} <b>${pred.probAway}%</b></span>
      </div>
      ${actualScore}
    </div>`;

  const statGrid = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Goles esperados</div>
        <div class="value">${pred.expHome} – ${pred.expAway}</div>
        <div class="note">${m.home.name.split(' ')[0]} vs ${m.away.name.split(' ')[0]}</div>
      </div>
      <div class="stat-card">
        <div class="label">Tarjetas estimadas</div>
        <div class="value">~${pred.cardsEstimate}</div>
        <div class="note">Basado en datos del torneo</div>
      </div>
      <div class="stat-card">
        <div class="label">Córners estimados</div>
        <div class="value">~${pred.cornersEstimate}</div>
        <div class="note">Promedio real de ambos equipos</div>
      </div>
      <div class="stat-card">
        <div class="label">Partidos jugados</div>
        <div class="value">${teamAverages(m.home.id).count} / ${teamAverages(m.away.id).count}</div>
        <div class="note">En el torneo (local/visitante)</div>
      </div>
    </div>`;

  const formSection = `
    <div class="section-title"><span class="gold">●</span> Forma reciente</div>
    <div class="form-row"><span class="team">${m.home.name}</span>${formDots(m.home.form)}</div>
    <div class="form-row"><span class="team">${m.away.name}</span>${formDots(m.away.form)}</div>`;

  const homeScorers = teamTopScorers(m.home.id);
  const awayScorers = teamTopScorers(m.away.id);
  const allScorers = [...homeScorers.map(s=>({...{name:s[0],goals:s[1]}, team:m.home.name})), ...awayScorers.map(s=>({name:s[0],goals:s[1],team:m.away.name}))]
    .sort((a,b)=> b.goals-a.goals);

  const playersSection = `
    <div class="section-title"><span class="gold">●</span> Goleadores destacados</div>
    ${allScorers.length ? allScorers.map(p=>`
      <div class="player-row">
        <div class="player-dot">⚽</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-team">${p.team}</div>
        </div>
        <div class="player-stat">${p.goals} gol${p.goals>1?'es':''}</div>
      </div>`).join('') : '<p class="muted-text">Todavía sin goles registrados en el torneo para estos equipos.</p>'}`;

  detailContent.innerHTML = `
    <div class="detail-header">
      <div class="detail-round">${translateRound(m.groupNote)}</div>
      <div class="detail-venue">${m.venue}${m.city? ', '+m.city:''}</div>
      <div class="detail-teams">
        <div class="dt-team"><img class="dt-flag" src="${m.home.logo}" alt="" onerror="this.style.visibility='hidden'"><div class="dt-name">${m.home.name}</div></div>
        <div class="dt-vs">VS</div>
        <div class="dt-team"><img class="dt-flag" src="${m.away.logo}" alt="" onerror="this.style.visibility='hidden'"><div class="dt-name">${m.away.name}</div></div>
      </div>
      <div class="detail-kickoff">${m.kickoff.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} · ${fmtTime(m.kickoff)}</div>
    </div>
    ${scoreboard}${statGrid}${formSection}${playersSection}`;
}

document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click', ()=> document.getElementById('detailOverlay').classList.add('hidden'));
});
elList.addEventListener('click', e=>{
  const card = e.target.closest('.match-card');
  if(card) openMatchDetail(card.getAttribute('data-id'));
});
document.getElementById('prevDay').addEventListener('click', ()=> shiftDay(-1));
document.getElementById('nextDay').addEventListener('click', ()=> shiftDay(1));
document.getElementById('refreshBtn').addEventListener('click', async ()=>{
  elList.innerHTML = '<div class="skeleton"><div class="spinner"></div>Actualizando…</div>';
  try{ await loadMatches(true); renderDay(); }catch(e){ elList.innerHTML = '<div class="error-banner">No se pudo actualizar. Probá de nuevo.</div>'; }
});

function initDateAndRender(){
  const todayKey = localDateKey(new Date());
  let initial = todayKey;
  if(initial < TOURNAMENT_START) initial = TOURNAMENT_START;
  if(initial > TOURNAMENT_END) initial = TOURNAMENT_END;
  state.selectedDate = initial;
  renderDay();
}

async function init(){
  elList.innerHTML = '<div class="skeleton"><div class="spinner"></div>Cargando partidos del Mundial…</div>';
  try{
    await loadMatches(false);
    initDateAndRender();
  }catch(err){
    elList.innerHTML = '<div class="error-banner">No se pudo cargar la información. Probá de nuevo en un momento.</div>';
  }
}
init();
})();
</script>
</body>
</html>
